name: Build

env:
  NODE_VERSION: 24

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ${{ matrix.os }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    defaults:
      run:
        working-directory: ./sheet

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Dependency Init
        run: npm install --legacy-peer-deps

      - name: npm React
        run: npm run build

      - name: npm Electron
        run: npx electron-builder --publish=never

      - name: Clean release assets
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          assets=$(gh release view "$tag" --json assets -q '.assets[].name' || true)
          if [ -n "$assets" ]; then
            while read -r name; do
              [ -n "$name" ] && gh release delete-asset "$tag" "$name" -y
            done <<< "$assets"
          fi

      - name: Upload assets
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          gh release upload "$tag" sheet/release/**/*Setup*.exe sheet/release/**/*.dmg sheet/release/**/*.AppImage --clobber

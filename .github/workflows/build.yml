name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # 1. CREA UNA RELEASE NUOVA E PULITA
  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Ricrea Release pulita
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete ${{ github.ref_name }} --repo ${{ github.repository }} --yes || true
          gh release create ${{ github.ref_name }} --repo ${{ github.repository }} --title "Versione ${{ github.ref_name }}" --notes "Scaricare il file d'installazione corretto per il proprio sistema operativo."

  # 2. COMPILA E CARICA SOLO I 3 FILE CHE VOGLIAMO
  release:
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: ./sheet
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - run: npm install --legacy-peer-deps
      
      - name: Compila App (Senza auto-publish)
        run: npx electron-builder 
      
      - name: Filtra e carica solo gli installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          for file in release/*Setup*.exe release/*.dmg release/*.AppImage; do
            if [ -f "$file" ]; then
              gh release upload ${{ github.ref_name }} "$file" --repo ${{ github.repository }} --clobber
            fi
          done